naftiko: 1.0.0-alpha2
info:
  label: Reloadly Gift Cards API — Transactions
  description: 'Reloadly Gift Cards API — Transactions. 1 operations. Lead operation: List Transactions. Self-contained Naftiko
    capability covering one Reloadly business surface.'
  tags:
  - Reloadly
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RELOADLY_API_KEY: RELOADLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: gift-cards-transactions
    baseUri: https://giftcards.reloadly.com
    description: Reloadly Gift Cards API — Transactions business capability. Self-contained, no shared references.
    resources:
    - name: transactions
      path: /transactions
      operations:
      - name: listtransactions
        method: GET
        description: List Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Filter transactions from this date (YYYY-MM-DD)
        - name: endDate
          in: query
          type: string
          description: Filter transactions to this date (YYYY-MM-DD)
    authentication:
      type: bearer
      token: '{{env.RELOADLY_API_KEY}}'
  exposes:
  - type: rest
    namespace: gift-cards-transactions-rest
    port: 8080
    description: REST adapter for Reloadly Gift Cards API — Transactions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/transactions
      name: transactions
      description: REST surface for transactions.
      operations:
      - method: GET
        name: listtransactions
        description: List Transactions
        call: gift-cards-transactions.listtransactions
        with:
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gift-cards-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Reloadly Gift Cards API — Transactions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-transactions
      description: List Transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gift-cards-transactions.listtransactions
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
