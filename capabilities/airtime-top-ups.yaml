naftiko: 1.0.0-alpha2
info:
  label: Reloadly Airtime API — Top-Ups
  description: 'Reloadly Airtime API — Top-Ups. 1 operations. Lead operation: Send Top-Up. Self-contained Naftiko capability
    covering one Reloadly business surface.'
  tags:
  - Reloadly
  - Top-Ups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RELOADLY_API_KEY: RELOADLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: airtime-top-ups
    baseUri: https://topups.reloadly.com
    description: Reloadly Airtime API — Top-Ups business capability. Self-contained, no shared references.
    resources:
    - name: topups
      path: /topups
      operations:
      - name: sendtopup
        method: POST
        description: Send Top-Up
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.RELOADLY_API_KEY}}'
  exposes:
  - type: rest
    namespace: airtime-top-ups-rest
    port: 8080
    description: REST adapter for Reloadly Airtime API — Top-Ups. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/topups
      name: topups
      description: REST surface for topups.
      operations:
      - method: POST
        name: sendtopup
        description: Send Top-Up
        call: airtime-top-ups.sendtopup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: airtime-top-ups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Reloadly Airtime API — Top-Ups. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: send-top-up
      description: Send Top-Up
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: airtime-top-ups.sendtopup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
