naftiko: "1.0.0-alpha1"

info:
  label: Reloadly Gift Cards API
  description: >-
    Reloadly Gift Cards API providing access to 3,000+ global brands and
    14,000+ products across 140+ countries. Supports product discovery,
    discount retrieval, order placement, and transaction management.
  tags:
    - Reloadly
    - Gift Cards
    - Rewards
    - Payments
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RELOADLY_CLIENT_ID: RELOADLY_CLIENT_ID
      RELOADLY_CLIENT_SECRET: RELOADLY_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: reloadly-gift-cards
      baseUri: https://giftcards.reloadly.com
      description: Reloadly Gift Cards REST API
      authentication:
        type: bearer
        token: "{{RELOADLY_ACCESS_TOKEN}}"
      resources:
        - name: products
          path: /products
          description: Gift card product catalog
          operations:
            - name: list-products
              method: GET
              description: List available gift card products with optional country/currency filters
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: Results per page
                - name: countryCode
                  in: query
                  type: string
                  required: false
                  description: ISO 3166-1 alpha-2 country code filter
                - name: currencyCode
                  in: query
                  type: string
                  required: false
                  description: ISO 4217 currency code filter
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-product
              method: GET
              description: Retrieve details for a specific gift card product
              inputParameters:
                - name: productId
                  in: path
                  type: integer
                  required: true
                  description: Unique product identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: discounts
          path: /discounts
          description: Gift card discount rates
          operations:
            - name: list-discounts
              method: GET
              description: List discount rates for all gift card products
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: Results per page
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-product-discount
              method: GET
              description: Get discount rate for a specific product
              inputParameters:
                - name: productId
                  in: path
                  type: integer
                  required: true
                  description: Product identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: orders
          path: /orders
          description: Gift card order management
          operations:
            - name: place-order
              method: POST
              description: Place a gift card order for immediate fulfillment
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  productId: "{{tools.productId}}"
                  quantity: "{{tools.quantity}}"
                  unitPrice: "{{tools.unitPrice}}"
                  senderName: "{{tools.senderName}}"
                  recipientEmail: "{{tools.recipientEmail}}"
            - name: get-order
              method: GET
              description: Retrieve a specific gift card order
              inputParameters:
                - name: orderId
                  in: path
                  type: integer
                  required: true
                  description: Order identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: transactions
          path: /transactions
          description: Transaction history
          operations:
            - name: list-transactions
              method: GET
              description: List all gift card transactions
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: Start date filter (YYYY-MM-DD)
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: End date filter (YYYY-MM-DD)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: balance
          path: /accounts/balance
          description: Account balance
          operations:
            - name: get-balance
              method: GET
              description: Retrieve current account balance
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: reloadly-gift-cards-api
      resources:
        - path: /v1/products
          name: products
          description: Gift card product catalog
          operations:
            - method: GET
              name: list-products
              description: List available gift card products
              call: "reloadly-gift-cards.list-products"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/products/{productId}
          name: product
          description: Individual gift card product
          operations:
            - method: GET
              name: get-product
              description: Get product details
              call: "reloadly-gift-cards.get-product"
              with:
                productId: "rest.productId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/discounts
          name: discounts
          description: Product discount rates
          operations:
            - method: GET
              name: list-discounts
              description: List all product discounts
              call: "reloadly-gift-cards.list-discounts"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/orders
          name: orders
          description: Gift card orders
          operations:
            - method: POST
              name: place-order
              description: Place a gift card order
              call: "reloadly-gift-cards.place-order"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/orders/{orderId}
          name: order
          description: Individual order
          operations:
            - method: GET
              name: get-order
              description: Get order details
              call: "reloadly-gift-cards.get-order"
              with:
                orderId: "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/transactions
          name: transactions
          description: Transaction history
          operations:
            - method: GET
              name: list-transactions
              description: List transactions
              call: "reloadly-gift-cards.list-transactions"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/balance
          name: balance
          description: Account balance
          operations:
            - method: GET
              name: get-balance
              description: Get account balance
              call: "reloadly-gift-cards.get-balance"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: reloadly-gift-cards-mcp
      transport: http
      tools:
        - name: list-gift-card-products
          description: Browse the gift card product catalog with optional country and currency filters
          hints:
            readOnly: true
            openWorld: true
          call: "reloadly-gift-cards.list-products"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-gift-card-product
          description: Get details for a specific gift card product
          hints:
            readOnly: true
            openWorld: true
          call: "reloadly-gift-cards.get-product"
          with:
            productId: "tools.productId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-discounts
          description: List discount rates available for gift card products
          hints:
            readOnly: true
            openWorld: true
          call: "reloadly-gift-cards.list-discounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: place-gift-card-order
          description: Order a digital gift card for a recipient
          hints:
            readOnly: false
            destructive: false
          call: "reloadly-gift-cards.place-order"
          with:
            productId: "tools.productId"
            quantity: "tools.quantity"
            unitPrice: "tools.unitPrice"
            senderName: "tools.senderName"
            recipientEmail: "tools.recipientEmail"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-order
          description: Retrieve a specific gift card order and its codes
          hints:
            readOnly: true
            openWorld: false
          call: "reloadly-gift-cards.get-order"
          with:
            orderId: "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-transactions
          description: List gift card transaction history
          hints:
            readOnly: true
            openWorld: false
          call: "reloadly-gift-cards.list-transactions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-balance
          description: Check current account balance
          hints:
            readOnly: true
            openWorld: false
          call: "reloadly-gift-cards.get-balance"
          outputParameters:
            - type: object
              mapping: "$."
