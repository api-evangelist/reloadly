naftiko: "1.0.0-alpha1"

info:
  label: Reloadly Airtime API
  description: >-
    Reloadly Airtime API for sending mobile top-ups and data bundles to
    phones across 170+ countries and 800+ operators. Supports auto-detection
    of mobile operators and real-time fulfillment.
  tags:
    - Reloadly
    - Airtime
    - Mobile Top-Up
    - Data Bundles
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RELOADLY_CLIENT_ID: RELOADLY_CLIENT_ID
      RELOADLY_CLIENT_SECRET: RELOADLY_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: reloadly-airtime
      baseUri: https://topups.reloadly.com
      description: Reloadly Airtime REST API
      authentication:
        type: bearer
        token: "{{RELOADLY_ACCESS_TOKEN}}"
      resources:
        - name: operators
          path: /operators
          description: Mobile network operators
          operations:
            - name: list-operators
              method: GET
              description: List mobile network operators with optional country filter
              inputParameters:
                - name: countryCode
                  in: query
                  type: string
                  required: false
                  description: ISO 3166-1 alpha-2 country code
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: Results per page
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-operator
              method: GET
              description: Get details for a specific mobile network operator
              inputParameters:
                - name: operatorId
                  in: path
                  type: integer
                  required: true
                  description: Operator identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: auto-detect-operator
              method: GET
              description: Auto-detect the mobile operator for a phone number
              inputParameters:
                - name: phone
                  in: path
                  type: string
                  required: true
                  description: Phone number
                - name: countryCode
                  in: path
                  type: string
                  required: true
                  description: ISO 3166-1 alpha-2 country code
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: topups
          path: /topups
          description: Airtime top-up operations
          operations:
            - name: send-topup
              method: POST
              description: Send an airtime top-up to a mobile phone
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  operatorId: "{{tools.operatorId}}"
                  amount: "{{tools.amount}}"
                  useLocalAmount: "{{tools.useLocalAmount}}"
                  customIdentifier: "{{tools.customIdentifier}}"
                  recipientPhone: "{{tools.recipientPhone}}"
                  senderPhone: "{{tools.senderPhone}}"

        - name: topup-transactions
          path: /topups/transactions
          description: Airtime transaction history
          operations:
            - name: list-topup-transactions
              method: GET
              description: List airtime top-up transactions
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: Start date filter
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: End date filter
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-topup-transaction
              method: GET
              description: Get details for a specific top-up transaction
              inputParameters:
                - name: transactionId
                  in: path
                  type: integer
                  required: true
                  description: Transaction identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: airtime-balance
          path: /accounts/balance
          description: Airtime account balance
          operations:
            - name: get-airtime-balance
              method: GET
              description: Get airtime account balance
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: reloadly-airtime-api
      resources:
        - path: /v1/operators
          name: operators
          description: Mobile network operators
          operations:
            - method: GET
              name: list-operators
              description: List mobile network operators
              call: "reloadly-airtime.list-operators"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/operators/{operatorId}
          name: operator
          description: Individual operator
          operations:
            - method: GET
              name: get-operator
              description: Get operator details
              call: "reloadly-airtime.get-operator"
              with:
                operatorId: "rest.operatorId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/topups
          name: topups
          description: Airtime top-ups
          operations:
            - method: POST
              name: send-topup
              description: Send an airtime top-up
              call: "reloadly-airtime.send-topup"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/transactions
          name: transactions
          description: Top-up transactions
          operations:
            - method: GET
              name: list-topup-transactions
              description: List top-up transactions
              call: "reloadly-airtime.list-topup-transactions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: reloadly-airtime-mcp
      transport: http
      tools:
        - name: list-operators
          description: Browse mobile network operators with optional country filter
          hints:
            readOnly: true
            openWorld: true
          call: "reloadly-airtime.list-operators"
          with:
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."
        - name: auto-detect-operator
          description: Auto-detect the mobile network operator for a phone number
          hints:
            readOnly: true
            openWorld: true
          call: "reloadly-airtime.auto-detect-operator"
          with:
            phone: "tools.phone"
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-airtime-topup
          description: Send mobile airtime top-up to a phone number
          hints:
            readOnly: false
            destructive: false
          call: "reloadly-airtime.send-topup"
          with:
            operatorId: "tools.operatorId"
            amount: "tools.amount"
            useLocalAmount: "tools.useLocalAmount"
            customIdentifier: "tools.customIdentifier"
            recipientPhone: "tools.recipientPhone"
            senderPhone: "tools.senderPhone"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-topup-transactions
          description: List airtime top-up transaction history
          hints:
            readOnly: true
            openWorld: false
          call: "reloadly-airtime.list-topup-transactions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-airtime-balance
          description: Check airtime account balance
          hints:
            readOnly: true
            openWorld: false
          call: "reloadly-airtime.get-airtime-balance"
          outputParameters:
            - type: object
              mapping: "$."
